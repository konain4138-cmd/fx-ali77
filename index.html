<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Page</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        header { border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <p>This is a simple, clean HTML page structure.</p>
        <h2>Getting Started</h2>
        <ul>
            <li>Edit the text inside the <code>&lt;body&gt;</code> tags.</li>
            <li>Add styles within the <code>&lt;style&gt;</code> block.</li>
            <li>Have fun building!</li>
        </ul>
    </main>

</body>
</html>
